title: AfterAI
description: Software development services — full-stack web apps, AI integration, and production-ready products
baseurl: ""
url: "https://afterailab.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# GitHub Pages settings
github: [metadata]

# Collections
collections:
  weekly:
    output: true
    permalink: /:collection/:name/

# Language settings
default_lang: en
languages: [en, ja]

# Site settings
author: AfterAI Inc.
email: contact@afterai.com

# Social links (add your actual social media handles)
github_username: AfterAILab
twitter_username: afterai

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      lang: en
  - scope:
      path: "ja"
    values:
      lang: ja

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - _admin/
  - README.md

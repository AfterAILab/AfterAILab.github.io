<!DOCTYPE html>
<html lang="{{ page.lang | default: site.default_lang | default: 'en' }}">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} - {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description"
        content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">

    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ─── Reset ─────────────────────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ─── Slot theme: defaults & transitions ───────────────────────────── */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            min-height: 100dvh;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            transition:
                background-color 1.2s ease,
                color 0.6s ease;

            /* Default before JS applies data-slot */
            --color-bg: oklch(96.5% 0.018 228);
            --color-text: oklch(20% 0.07 250);
            --color-text-secondary: oklch(52% 0.1 238);
            --color-primary: oklch(52% 0.23 245);
            --color-primary-hover: oklch(44% 0.23 245);
            --color-primary-light: oklch(94% 0.055 228);
            --color-surface: oklch(99% 0.01 228);
            --color-border: oklch(88% 0.04 228);

            background-color: var(--color-bg);
            color: var(--color-text);
        }

        @media (prefers-color-scheme: dark) {
            body:not([data-slot]) {
                --color-bg: oklch(11% 0.03 255);
                --color-text: oklch(88% 0.028 250);
                --color-text-secondary: oklch(60% 0.05 250);
                --color-primary: oklch(68% 0.13 220);
                --color-primary-hover: oklch(60% 0.13 220);
                --color-primary-light: oklch(20% 0.06 255);
                --color-surface: oklch(16% 0.035 255);
                --color-border: oklch(25% 0.04 255);
            }
        }

        /* ─── MORNING 6:00–12:00 ───────────────────────────────────────────── */
        body[data-slot="morning"] {
            --color-bg: oklch(97% 0.028 82);
            --color-primary: oklch(60% 0.21 46);
            --color-primary-hover: oklch(52% 0.21 46);
            --color-primary-light: oklch(94% 0.07 78);
            --color-text: oklch(22% 0.07 50);
            --color-text-secondary: oklch(55% 0.09 62);
            --color-surface: oklch(99.5% 0.008 78);
            --color-border: oklch(88% 0.05 80);

            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, oklch(90% 0.09 70 / 0.5), transparent),
                radial-gradient(ellipse 60% 40% at 80% 110%, oklch(88% 0.08 55 / 0.35), transparent);
        }

        /* ─── AFTERNOON 12:00–18:00 ────────────────────────────────────────── */
        body[data-slot="afternoon"] {
            --color-bg: oklch(96.5% 0.018 228);
            --color-primary: oklch(52% 0.23 245);
            --color-primary-hover: oklch(44% 0.23 245);
            --color-primary-light: oklch(94% 0.055 228);
            --color-text: oklch(20% 0.07 250);
            --color-text-secondary: oklch(52% 0.1 238);
            --color-surface: oklch(99% 0.01 228);
            --color-border: oklch(88% 0.04 228);

            background-image:
                radial-gradient(ellipse 70% 45% at 85% -5%, oklch(88% 0.07 215 / 0.5), transparent),
                radial-gradient(ellipse 55% 35% at 10% 105%, oklch(86% 0.06 240 / 0.3), transparent);
        }

        /* ─── EVENING 18:00–24:00 ──────────────────────────────────────────── */
        body[data-slot="evening"] {
            --color-bg: oklch(27% 0.07 290);
            --color-primary: oklch(76% 0.20 25);
            --color-primary-hover: oklch(68% 0.20 25);
            --color-primary-light: oklch(36% 0.10 290);
            --color-text: oklch(93% 0.020 290);
            --color-text-secondary: oklch(68% 0.05 290);
            --color-surface: oklch(32% 0.075 290);
            --color-border: oklch(41% 0.07 290);

            background-image:
                radial-gradient(ellipse 75% 50% at 90% 0%, oklch(55% 0.18 35 / 0.45), transparent),
                radial-gradient(ellipse 50% 40% at 5% 100%, oklch(22% 0.09 270 / 0.5), transparent);
        }

        /* ─── NOCTURNE 0:00–6:00 ───────────────────────────────────────────── */
        body[data-slot="nocturne"] {
            --color-bg: oklch(11% 0.03 255);
            --color-primary: oklch(68% 0.13 220);
            --color-primary-hover: oklch(60% 0.13 220);
            --color-primary-light: oklch(20% 0.06 255);
            --color-text: oklch(88% 0.028 250);
            --color-text-secondary: oklch(60% 0.05 250);
            --color-surface: oklch(16% 0.035 255);
            --color-border: oklch(25% 0.04 255);

            background-image:
                radial-gradient(ellipse 60% 40% at 50% -10%, oklch(20% 0.07 240 / 0.7), transparent),
                radial-gradient(ellipse 40% 30% at 95% 95%, oklch(18% 0.05 270 / 0.5), transparent);
        }

        /* ─── Layout ───────────────────────────────────────────────────────── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ─── Header ──────────────────────────────────────────────────────── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--color-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo:hover {
            color: var(--color-primary-hover);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        nav a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        nav a:hover {
            color: var(--color-primary);
            background: var(--color-primary-light);
        }

        /* ─── Card ─────────────────────────────────────────────────────────── */
        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 24px;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 12px oklch(0% 0 0 / 0.08);
            border-color: var(--color-primary-light);
        }

        /* ─── Content (used by inner pages) ────────────────────────────────── */
        .content {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 32px;
            margin: 24px 0;
        }

        .content h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 24px;
        }

        .content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text);
            margin-top: 24px;
            margin-bottom: 12px;
        }

        .content p {
            margin-bottom: 16px;
            color: var(--color-text);
        }

        .content a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .content a:hover {
            color: var(--color-primary-hover);
            text-decoration: underline;
        }

        .content ul, .content ol {
            margin-left: 24px;
            margin-bottom: 16px;
        }

        .content li {
            margin-bottom: 8px;
        }

        .content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .content blockquote {
            border-left: 3px solid var(--color-primary);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--color-text-secondary);
        }

        .content code {
            background: var(--color-primary-light);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .content pre {
            background: var(--color-primary-light);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .content table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }

        .content th, .content td {
            border: 1px solid var(--color-border);
            padding: 10px 14px;
            text-align: left;
        }

        .content th {
            background: var(--color-primary-light);
            font-weight: 600;
        }

        /* ─── Section title ────────────────────────────────────────────────── */
        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
        }

        .section-subtitle {
            font-size: 1rem;
            color: var(--color-text-secondary);
            margin-bottom: 32px;
        }

        /* ─── Weekly grid ──────────────────────────────────────────────────── */
        .weekly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 24px 0;
        }

        .weekly-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 16px;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .weekly-item:hover {
            box-shadow: 0 4px 12px oklch(0% 0 0 / 0.08);
            border-color: var(--color-primary-light);
        }

        .weekly-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            height: 100%;
        }

        .weekly-item img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .weekly-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-primary);
            text-align: center;
        }

        /* ─── Link arrow ───────────────────────────────────────────────────── */
        .link-arrow {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .link-arrow:hover {
            color: var(--color-primary-hover);
            text-decoration: underline;
        }

        /* ─── Button ───────────────────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: var(--color-primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background: var(--color-primary-hover);
        }

        .btn-outline {
            background: transparent;
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
        }

        .btn-outline:hover {
            background: var(--color-primary-light);
            color: var(--color-primary-hover);
        }

        /* ─── Callout (used by flaps/yugioh pages) ─────────────────────────── */
        .callout {
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid;
            border-radius: 8px;
        }

        .callout-note {
            background: var(--color-primary-light);
            border-left-color: var(--color-primary);
        }

        .callout-success {
            background: oklch(94% 0.05 145);
            border-left-color: oklch(55% 0.2 145);
        }

        .callout-question {
            background: oklch(94% 0.06 85);
            border-left-color: oklch(75% 0.15 85);
        }

        /* ─── Video container ──────────────────────────────────────────────── */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
            border-radius: 8px;
            margin: 16px 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .img-fluid {
            max-width: 100%;
            height: auto;
        }

        /* ─── Footer ──────────────────────────────────────────────────────── */
        footer {
            text-align: center;
            margin-top: 64px;
            padding: 24px 0;
            border-top: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            font-size: 0.875rem;
        }

        /* ─── Focus states ─────────────────────────────────────────────────── */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        /* ─── Responsive ───────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                margin-bottom: 32px;
            }

            nav ul {
                justify-content: center;
            }

            .content {
                padding: 20px;
                margin: 16px 0;
            }

            .weekly-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            footer {
                margin-top: 40px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            nav a {
                font-size: 0.85rem;
                padding: 6px 12px;
            }

            .content {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
<script>
(function(){var h=new Date().getHours();document.body.setAttribute('data-slot',h<6?'nocturne':h<12?'morning':h<18?'afternoon':'evening')})();
</script>

    <div class="container">
        <header>
            <a href="{{ '/' | relative_url }}" class="logo">AfterAI</a>
            <nav>
                <ul>
                    <li><a href="{{ '/' | relative_url }}">Home</a></li>
                    <li><a href="{{ '/about' | relative_url }}">About</a></li>
                    <li><a href="{{ '/weekly' | relative_url }}">Weekly</a></li>
                    <li><a href="{{ '/' | relative_url }}#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main>
            {{ content }}
        </main>

        <footer>
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. All rights reserved.</p>
        </footer>
    </div>

<script>
(function(){
    function apply(){
        var h=new Date().getHours();
        document.body.setAttribute('data-slot',h<6?'nocturne':h<12?'morning':h<18?'afternoon':'evening');
    }
    setInterval(apply,60000);
    document.addEventListener('visibilitychange',function(){
        if(document.visibilityState==='visible') apply();
    });
})();
</script>
</body>
</html>
